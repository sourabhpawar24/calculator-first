<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f5f5f5;
}

.calculator{
    width:350px;
    padding:20px;
    border:2px solid black;
    border-radius:10px;
    background-color:darkslategray;

    display:flex;
    flex-direction:column;
    gap:15px;
}

.calculator-display{
    height:60px;
    width:100%;

    border:2px solid black;
    border-radius:8px;

    padding:10px;
    font-size:2rem;
    text-align:right;
}

.calculator-buttons{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
}

.calculator-buttons button{
    height:60px;

    border:none;
    border-radius:8px;

    font-size:1.2rem;
    cursor:pointer;
}

.calculator-buttons button:hover{
    transform:scale(1.03);
}</style>
</head>
<body>

    <main class="calculator">

        <input
            type="text"
            class="calculator-display"
            value="0"
            readonly
        >

        <div class="calculator-buttons">

            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>/</button>

            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>*</button>

            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button>-</button>

            <button>0</button>
            <button>⌫</button>
            <button>=</button>
            <button>+</button>

        </div>

    </main>

    <script>
        const display = document.querySelector('.calculator-display');
const buttons = document.querySelectorAll('.calculator-buttons button');

let currentInput = '';
let shouldReset = false;

buttons.forEach(button => {
    button.addEventListener('click', () => {
        const value = button.textContent;

        if (value === '=') {
            if (currentInput === '') return;
            try {
                const result = Function('"use strict"; return (' + currentInput + ')')();
                display.value = parseFloat(result.toFixed(10));
                currentInput = String(parseFloat(result.toFixed(10)));
                shouldReset = true;
            } catch {
                display.value = 'Error';
                currentInput = '';
            }

        } else if (['+', '-', '*', '/'].includes(value)) {
            if (currentInput === '') return;
            // Replace last operator if input ends with one
            if (['+', '-', '*', '/'].includes(currentInput.slice(-1))) {
                currentInput = currentInput.slice(0, -1);
            }
            currentInput += value;
            display.value = currentInput;
            shouldReset = false;

            } else if (value === '⌫') {
    currentInput = currentInput.slice(0, -1);
    display.value = currentInput || '0';
}

        else {
            // Number or '00'
            if (shouldReset) {
                currentInput = '';
                shouldReset = false;
            }
            currentInput += value;
            display.value = currentInput;
        }
    });
});

// Keyboard support
document.addEventListener('keydown', (e) => {
    const key = e.key;
    if ('0123456789'.includes(key) || ['+', '-', '*', '/'].includes(key)) {
        document.querySelector(`.calculator-buttons button:not([data-ignore])`);
        // Find and click matching button
        buttons.forEach(btn => {
            if (btn.textContent === key) btn.click();
        });
    } else if (key === 'Enter' || key === '=') {
        buttons.forEach(btn => { if (btn.textContent === '=') btn.click(); });
    } else if (key === 'Backspace') {
        currentInput = currentInput.slice(0, -1);
        display.value = currentInput || '0';
    } else if (key === 'Escape') {
        currentInput = '';
        display.value = '0';
        shouldReset = false;
    }
});
    </script>

</body>
</html>
