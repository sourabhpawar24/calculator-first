<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f5f5f5;
}

.calculator{
    width:350px;
    padding:20px;
    border:2px solid black;
    border-radius:10px;
    background-color:darkslategray;

    display:flex;
    flex-direction:column;
    gap:15px;
}

.calculator-display{
    height:60px;
    width:100%;

    border:2px solid black;
    border-radius:8px;

    padding:10px;
    font-size:2rem;
    text-align:right;
}

.calculator-buttons{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
}

.calculator-buttons button{
    height:60px;

    border:none;
    border-radius:8px;

    font-size:1.2rem;
    cursor:pointer;
}

.calculator-buttons button:hover{
    transform:scale(1.03);
}</style>
</head>
<body>

    <main class="calculator">

        <input
            type="text"
            class="calculator-display"
            value="0"
            readonly
        >

        <div class="calculator-buttons">

            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>/</button>

            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>*</button>

            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button>-</button>

            <button>0</button>
            <button>⌫</button>
            <button>=</button>
            <button>+</button>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
